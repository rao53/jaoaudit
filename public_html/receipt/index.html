<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — J.A. Olawin & Co. Receipt System</title>
    <link rel="icon" type="image/svg+xml" href="/receipt/favicon.svg" />
    <link rel="stylesheet" href="/receipt/style.css" />
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  </head>
  <body class="login-page">
    <div class="login-container">
      <div class="login-brand">
        <img
          src="/images/logo.png"
          alt="J.A. Olawin & Co."
          class="login-logo"
        />
        <h1>J.A. Olawin &amp; Co.</h1>
        <p class="login-tagline">Chartered Accountants</p>
      </div>
      <p class="login-descriptor">Receipt Management System</p>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            required
            autofocus
            autocomplete="username"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
            />
            <button
              type="button"
              id="toggle-password"
              class="password-toggle"
              aria-label="Show password"
            >
              <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" id="login-btn">Login</button>
      </form>
      <div id="login-error" class="alert-error" role="alert" aria-live="polite"></div>
    </div>

    <script src="/receipt/receipt-login.js"></script>
  </body>
</html>
